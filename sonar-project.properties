# SonarQube project configuration
sonar.projectKey=jb-dots_PeakMetrics-Business-Performance-Management-System
sonar.organization=jb-dots

# Exclude auto-generated EF Core migration files from all analysis including secrets scanning.
# Migration snapshots contain BCrypt hashes that are auto-generated demo seed data,
# not real credentials. The source of truth is AppDbContext.cs SeedData().
sonar.exclusions=Migrations/**,obj/**,bin/**

# Suppress secrets rule S8215 specifically for the Migrations folder
sonar.issue.ignore.multicriteria=e1
sonar.issue.ignore.multicriteria.e1.ruleKey=secrets:S8215
sonar.issue.ignore.multicriteria.e1.resourceKey=Migrations/**
